<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Eligibility - Ken Wa Kan</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>

        <a href="gi.html">Gi Inventory</a>

        <a href="belt.html">Belts Inventory</a>

        <a href="promotions.html">
            Promotion Eligibility
        </a>

        <button id="logoutBtn">
            Logout
        </button>

    </nav>

    <h1>Eligible Students for Promotion</h1>

    <button id="addPromotionRow">
        + Add Student
    </button>

    <table>

        <thead>

            <tr>

                <th>Student Name</th>

                <th>Current Belt</th>
                <th>Next Belt</th>
                <th>Current Attendance</th>

                <th>Required Attendance</th>

                <th>Shihan Approval?</th>
                <th>Anticipated Promotion Date</th>
                <th>Email Sent?</th>

                <th>Remove</th>

            </tr>
        </thead>

        <tbody id="promotionTable">

            <tr>

                <td>
                    <input
                        type="text"
                         class="studentName"
                        placeholder="Student Name">
                </td>

                <td>

                    <select>

                        <option>White/Yellow</option>
            <option>White/Orange</option>
            <option>White/Green</option>
            <option>White/Brown</option>

            <option>White/Double Yellow</option>
            <option>White/Double Orange</option>
            <option>White/Double Green</option>
            <option>White/Double Brown</option>

            <option>White/Blue</option>

            <option>Blue</option>
            <option>Blue/Yellow</option>

            <option>Yellow</option>
            <option>Yellow/Orange</option>

            <option>Orange</option>
            <option>Orange/Green</option>

            <option>Green</option>
            <option>Green/Brown</option>

            <option>Brown</option>
            <option>Brown/Black</option>

            <option>Black</option>

                    </select>

                </td>

                <td>

                    <select>

                        <option>White/Yellow</option>
            <option>White/Orange</option>
            <option>White/Green</option>
            <option>White/Brown</option>

            <option>White/Double Yellow</option>
            <option>White/Double Orange</option>
            <option>White/Double Green</option>
            <option>White/Double Brown</option>

            <option>White/Blue</option>

            <option>Blue</option>
            <option>Blue/Yellow</option>

            <option>Yellow</option>
            <option>Yellow/Orange</option>

            <option>Orange</option>
            <option>Orange/Green</option>

            <option>Green</option>
            <option>Green/Brown</option>

            <option>Brown</option>
            <option>Brown/Black</option>

            <option>Black</option>

                    </select>

                </td>

                <td>

                    <input
                        type="number"
                        class="requiredClasses"
                        min="">

                </td>

                <td>

                    <input
                        type="number"
                        class="completedClasses"
                        min="">

                </td>
                <td>

                    <input
                        type="checkbox"
                        class="eligible">

                </td>
           <td>

                    <input
                        type="date"
                        placeholder="Date">

                </td>
                

                

             
                <td>

                    <input
                        type="checkbox"
                        class="emailSent">

                </td>
                <td>

                    <button class="deleteRow">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

    <script src="js/promotions.js"></script>
    <script type="module" src="js/logout.js"></script>

</body>

</html>
